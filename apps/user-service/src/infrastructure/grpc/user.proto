syntax = "proto3";

package user;

service UserService {
  rpc ValidateUser (UserRequest) returns (UserResponse);
  rpc GetPermissions (UserRequest) returns (PermissionsResponse);
}

message UserRequest {
  string userId = 1;
}

message UserResponse {
  bool isValid = 1;
  string role = 2;
  string name = 3;
}

message PermissionsResponse {
  repeated string permissions = 1;
}
