# SonarQube - Monorepo Configuration
sonar.projectKey=g6-uce-library-distribuited-system
sonar.projectName=g6-uce-library-distribuited-system

sonar.sourceEncoding=UTF-8

# Monorepo Sources (Next.js, Express, Expo, etc.)
sonar.sources=apps

# Exclusions exactly as requested
sonar.exclusions=**/node_modules/**,**/.next/**,**/dist/**,**/build/**,**/*.test.ts,**/*.test.tsx,**/*.test.js

# Test Coverage Reports paths
sonar.javascript.lcov.reportPaths=**/coverage/lcov.info
sonar.typescript.lcov.reportPaths=**/coverage/lcov.info
