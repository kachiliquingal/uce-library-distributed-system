version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    restart: unless-stopped
    networks:
      - brokers-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://${HOST_IP:-localhost}:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    restart: unless-stopped
    networks:
      - brokers-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-admin123}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    restart: unless-stopped
    networks:
      - brokers-network

  rabbitmq-init:
    image: rabbitmq:3.13-management
    container_name: rabbitmq-init
    depends_on:
      - rabbitmq
    networks:
      - brokers-network
    entrypoint: [ '/bin/bash', '-c' ]
    command: |
      "
      echo 'Waiting for RabbitMQ to be ready...'
      sleep 15
      echo 'Creating RabbitMQ Definitions...'
      rabbitmqadmin -H rabbitmq -u admin -p $${RABBITMQ_DEFAULT_PASS} declare exchange name=library.dlx type=direct durable=true
      rabbitmqadmin -H rabbitmq -u admin -p $${RABBITMQ_DEFAULT_PASS} declare queue name=fine.trigger.dlq durable=true
      rabbitmqadmin -H rabbitmq -u admin -p $${RABBITMQ_DEFAULT_PASS} declare queue name=fine.trigger durable=true arguments='{\"x-dead-letter-exchange\":\"library.dlx\",\"x-dead-letter-routing-key\":\"fine.trigger.dlq\"}'
      rabbitmqadmin -H rabbitmq -u admin -p $${RABBITMQ_DEFAULT_PASS} declare binding source=library.dlx destination=fine.trigger.dlq routing_key=fine.trigger.dlq
      rabbitmqadmin -H rabbitmq -u admin -p $${RABBITMQ_DEFAULT_PASS} declare queue name=notifications durable=true
      rabbitmqadmin -H rabbitmq -u admin -p $${RABBITMQ_DEFAULT_PASS} declare queue name=book.reservations durable=true
      rabbitmqadmin -H rabbitmq -u admin -p $${RABBITMQ_DEFAULT_PASS} declare queue name=user.activity durable=true
      echo 'Successfully created all RabbitMQ definitions!'
      "
    environment:
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-admin123}
  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-init
    depends_on:
      - kafka
    networks:
      - brokers-network
    entrypoint: [ '/bin/sh', '-c' ]
    command: |
      "
      echo 'Waiting for Kafka to be ready...'
      cub kafka-ready -b kafka:29092 1 60 &&
      echo 'Creating Kafka topics...'
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --partitions 1 --replication-factor 1 --topic auth-events &&
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --partitions 1 --replication-factor 1 --topic catalog-events &&
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --partitions 1 --replication-factor 1 --topic loan-events &&
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --partitions 1 --replication-factor 1 --topic user-events &&
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --partitions 1 --replication-factor 1 --topic fine-events &&
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --partitions 1 --replication-factor 1 --topic inventory-events &&
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --partitions 1 --replication-factor 1 --topic notification-events &&
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --partitions 1 --replication-factor 1 --topic system-events &&
      echo 'Successfully created all topics!'
      "

  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
    restart: unless-stopped
    networks:
      - brokers-network

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=${HOST_IP:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://${HOST_IP:-localhost}:5678/
      - GENERIC_TIMEZONE=America/Guayaquil
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped
    networks:
      - brokers-network

networks:
  brokers-network:
    driver: bridge

volumes:
  n8n_data:
