version: "3.8"

services:
  auth-service:
    image: kachiliquingal/uce-auth-service:${IMAGE_TAG}
    container_name: auth-service
    restart: always
    command: sh -c "sleep 15 && node dist/index.js"
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=${DB_HOST}
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
      - KAFKA_BROKERS=${KAFKA_BROKERS:-kafka:29092}
    networks:
      - microservices-network

  catalog-service:
    image: kachiliquingal/uce-catalog-service:${IMAGE_TAG}
    container_name: catalog-service
    restart: always
    command: sh -c "sleep 15 && node dist/index.js"
    ports:
      - "3002:3002"
      - "50052:50052"
    environment:
      - PORT=3002
      - MONGO_URI=${MONGO_URI}
      - KAFKA_BROKERS=${KAFKA_BROKERS:-kafka:29092}
    networks:
      - microservices-network

  user-service:
    image: kachiliquingal/uce-user-service:${IMAGE_TAG}
    container_name: user-service
    restart: always
    command: sh -c "sleep 15 && node dist/index.js"
    ports:
      - "3003:3003"
      - "50051:50051"
    environment:
      - PORT=3003
      - NEO4J_URI=${NEO4J_URI}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - KAFKA_BROKERS=${KAFKA_BROKERS:-kafka:29092}
    networks:
      - microservices-network

  loan-service:
    image: kachiliquingal/uce-loan-service:${IMAGE_TAG}
    container_name: loan-service
    restart: always
    command: sh -c "sleep 20 && node dist/index.js"
    ports:
      - "3004:3004"
    environment:
      - PORT=3004
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=${DB_HOST}
      - DB_PORT=3306
      - DB_NAME=${DB_NAME}
      - USER_SERVICE_URL=${USER_SERVICE_URL}
      - KAFKA_BROKERS=${KAFKA_BROKERS:-kafka:29092}
      - RABBITMQ_URL=${RABBITMQ_URL}
    networks:
      - microservices-network

  notification-service:
    image: kachiliquingal/uce-notification-service:${IMAGE_TAG}
    container_name: notification-service
    restart: always
    command: sh -c "sleep 25 && node dist/index.js"
    ports:
      - "3005:3005"
    environment:
      - PORT=3005
      - KAFKA_BROKERS=${KAFKA_BROKERS:-kafka:29092}
      - RABBITMQ_URL=${RABBITMQ_URL}
    networks:
      - microservices-network

  frontend:
    image: kachiliquingal/uce-frontend:${IMAGE_TAG}
    container_name: frontend
    restart: always
    networks:
      - microservices-network

  api-gateway:
    image: kachiliquingal/uce-api-gateway:${IMAGE_TAG}
    container_name: api-gateway
    restart: always
    ports:
      - "80:80"
    environment:
      - AUTH_SERVICE_URL=auth-service:3001
      - CATALOG_SERVICE_URL=catalog-service:3002
      - USER_SERVICE_URL=user-service:3003
      - LOAN_SERVICE_URL=loan-service:3004
      - NOTIFICATION_SERVICE_URL=notification-service:3005
      - FRONTEND_SERVICE_URL=frontend:80
    networks:
      - microservices-network

networks:
  microservices-network:
    external: true
