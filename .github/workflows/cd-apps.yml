name: CD Apps - DockerHub Deployment & Quality Gates

on:
  push:
    branches: ["qa", "main"]
    paths:
      - "apps/**"
      - "tests/**"
      - ".github/workflows/cd-apps.yml"

jobs:
  quality-gates-verification:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci || npm install

      - name: Verify Functional E2E Integration Suite
        run: npx jest --config tests/functional/jest.config.cjs

      - name: Setup Grafana k6
        uses: grafana/setup-k6-action@v1

      - name: Verify Grafana k6 Load & Stress Quality Gates
        uses: grafana/run-k6-action@v1
        with:
          path: tests/load/k6-load-test.js

  build-and-push:
    runs-on: ubuntu-latest
    needs: quality-gates-verification
    strategy:
      matrix:
        app: [auth-service, catalog-service, user-service, loan-service, notification-service, api-gateway, fine-service, search-service, inventory-service, report-service, reservation-service]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Microservice (${{ matrix.app }})
        uses: docker/build-push-action@v5
        with:
          context: ./apps/${{ matrix.app }}
          push: true
          tags: |
            kachiliquingal/uce-${{ matrix.app }}:1.0.0-${{ github.ref == 'refs/heads/main' && 'prod' || 'qa' }}
            kachiliquingal/uce-${{ matrix.app }}:latest

  build-frontend:
    runs-on: ubuntu-latest
    needs: build-and-push
    env:
      TF_VAR_docker_image_tag: "1.0.0-${{ github.ref == 'refs/heads/main' && 'prod' || 'qa' }}"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./apps/frontend
          push: true
          build-args: |
            VITE_STRIPE_PUBLIC_KEY=${{ secrets.VITE_STRIPE_PUBLIC_KEY }}
          tags: |
            kachiliquingal/uce-frontend:${{ env.TF_VAR_docker_image_tag }}
            kachiliquingal/uce-frontend:latest
