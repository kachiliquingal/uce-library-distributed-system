name: CD Apps - DockerHub

on:
  push:
    branches: ["qa", "main"]
    paths:
      - "apps/**"
      - ".github/workflows/cd-apps.yml"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [auth-service, catalog-service, user-service, loan-service, notification-service, api-gateway, fine-service]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v4
        with:
          context: ./apps/${{ matrix.app }}
          push: true
          tags: |
            kachiliquingal/uce-${{ matrix.app }}:1.0.0-${{ github.ref == 'refs/heads/main' && 'prod' || 'qa' }}
            kachiliquingal/uce-${{ matrix.app }}:latest

  build-frontend:
    runs-on: ubuntu-latest
    needs: build-and-push
    env:
      TF_VAR_docker_image_tag: "1.0.0-${{ github.ref == 'refs/heads/main' && 'prod' || 'qa' }}"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Frontend
        uses: docker/build-push-action@v4
        with:
          context: ./apps/frontend
          push: true
          build-args: |
            VITE_STRIPE_PUBLIC_KEY=${{ secrets.VITE_STRIPE_PUBLIC_KEY }}
          tags: |
            kachiliquingal/uce-frontend:${{ env.TF_VAR_docker_image_tag }}
            kachiliquingal/uce-frontend:latest
