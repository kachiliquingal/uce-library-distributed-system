name: Deploy Infrastructure (Terraform)

on:
  push:
    branches:
      - qa
      - main
    paths:
      - "terraform/**"
      - ".github/workflows/deploy-infra.yml"

jobs:
  terraform-deploy:
    runs-on: ubuntu-latest

    env:
      # Define the environment based on the branch (qa or prod)
      TF_VAR_environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'qa' }}
      TF_VAR_docker_image_tag: "1.0.0"
      AWS_REGION: "us-east-1"

      # Dynamic injection of the S3 bucket name based on the account
      TF_STATE_BUCKET: ${{ github.ref == 'refs/heads/main' && 'uce-library-terraform-state-prod-kachiliquingal' || 'uce-library-terraform-state-kachiliquingal' }}

      # Dynamic credential injection based on the AWS Academy isolated account
      AWS_ACCESS_KEY_ID: ${{ github.ref == 'refs/heads/main' && secrets.PROD_AWS_ACCESS_KEY_ID || secrets.QA_AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ github.ref == 'refs/heads/main' && secrets.PROD_AWS_SECRET_ACCESS_KEY || secrets.QA_AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ github.ref == 'refs/heads/main' && secrets.PROD_AWS_SESSION_TOKEN || secrets.QA_AWS_SESSION_TOKEN }}

      # New secret variables for Terraform
      TF_VAR_db_password: ${{ secrets.TF_VAR_db_password }}
      TF_VAR_jwt_secret: ${{ secrets.TF_VAR_jwt_secret }}
      TF_VAR_mongo_password: ${{ secrets.TF_VAR_mongo_password }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Execute S3 Backend Setup Script
        run: |
          chmod +x ./scripts/setup-s3-backend.sh
          ./scripts/setup-s3-backend.sh

      - name: Terraform Init
        run: |
          cd terraform
          terraform init -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" -backend-config="key=${{ env.TF_VAR_environment }}/terraform.tfstate"

      - name: Terraform Plan
        run: |
          cd terraform
          terraform plan -out=tfplan

      - name: Terraform Apply
        run: |
          cd terraform
          terraform apply -auto-approve tfplan

      - name: Extract IPs and inject them into the frontend
        run: |
          cd terraform
          AUTH_IP=$(terraform output -raw public_ip)
          CATALOG_IP=$(terraform output -raw catalog_public_ip)
          
          # Go to the root directory and create the production .env file for Vite
          cd ..
          echo "VITE_AUTH_API_URL=http://$AUTH_IP:3001/api/auth" > apps/frontend/.env.production
          echo "VITE_CATALOG_API_URL=http://$CATALOG_IP:3002/api/catalog" >> apps/frontend/.env.production
          
          echo "IPs injected successfully: AUTH=$AUTH_IP, CATALOG=$CATALOG_IP"

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Upload Frontend
        uses: docker/build-push-action@v4
        with:
          context: ./apps/frontend
          push: true
          tags: |
            kachiliquingal/uce-frontend:${{ env.TF_VAR_docker_image_tag }}
            kachiliquingal/uce-frontend:latest
