name: Deploy Infrastructure (Terraform)

on:
  push:
    branches:
      - qa
      - main
    paths:
      - "infrastructure/**"
      - "deploy/**"
      - ".github/workflows/deploy-infra.yml"

jobs:
  terraform-deploy:
    runs-on: ubuntu-latest

    env:
      TF_VAR_environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'qa' }}
      TF_VAR_docker_image_tag: "1.0.0-${{ github.ref == 'refs/heads/main' && 'prod' || 'qa' }}"
      TF_WORK_DIR: ${{ github.ref == 'refs/heads/main' && 'infrastructure/prod' || 'infrastructure/qa' }}
      AWS_REGION: "us-east-1"
      TF_STATE_BUCKET: ${{ github.ref == 'refs/heads/main' && 'uce-library-terraform-state-prod-kachiliquingal' || 'uce-library-terraform-state-kachiliquingal' }}
      AWS_ACCESS_KEY_ID: ${{ github.ref == 'refs/heads/main' && secrets.PROD_AWS_ACCESS_KEY_ID || secrets.QA_AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ github.ref == 'refs/heads/main' && secrets.PROD_AWS_SECRET_ACCESS_KEY || secrets.QA_AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ github.ref == 'refs/heads/main' && secrets.PROD_AWS_SESSION_TOKEN || secrets.QA_AWS_SESSION_TOKEN }}
      TF_VAR_db_password: ${{ secrets.TF_VAR_db_password }}
      TF_VAR_jwt_secret: ${{ secrets.TF_VAR_jwt_secret }}
      TF_VAR_mongo_password: ${{ secrets.TF_VAR_mongo_password }}
      TF_VAR_db_user: ${{ secrets.TF_VAR_DB_USER }}
      TF_VAR_rabbitmq_password: ${{ secrets.TF_VAR_RABBITMQ_PASSWORD }}
      TF_VAR_neo4j_password: ${{ secrets.TF_VAR_NEO4J_PASSWORD }}
      TF_VAR_cuenta_b_aws_access_key_id: ${{ secrets.QA_B_AWS_ACCESS_KEY_ID }}
      TF_VAR_cuenta_b_aws_secret_access_key: ${{ secrets.QA_B_AWS_SECRET_ACCESS_KEY }}
      TF_VAR_cuenta_b_aws_session_token: ${{ secrets.QA_B_AWS_SESSION_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0
          terraform_wrapper: false

      - name: Provision S3 Backend Bucket
        run: |
          chmod +x ./scripts/setup-s3-backend.sh
          ./scripts/setup-s3-backend.sh

      - name: Terraform Init
        run: |
          cd ${{ env.TF_WORK_DIR }}
          terraform init -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" -backend-config="key=${{ env.TF_VAR_environment }}/terraform.tfstate"

      - name: Terraform Plan
        run: |
          cd ${{ env.TF_WORK_DIR }}
          terraform plan -out=tfplan

      - name: Terraform Apply
        run: |
          cd ${{ env.TF_WORK_DIR }}
          terraform apply -auto-approve tfplan

      - name: Show Infrastructure Outputs
        run: |
          cd ${{ env.TF_WORK_DIR }}
          echo "=== Infrastructure Outputs ==="
          echo "API Gateway / Bastion IP: $(terraform output -raw api_gateway_public_ip)"
          echo "==============================="
