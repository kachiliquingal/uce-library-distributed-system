name: Continuous Integration

on:
  pull_request:
    branches: ["qa", "main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"
          cache: "npm"

      - name: Fix Cross-Platform Tailwind Bindings & Install
        run: |
          rm package-lock.json
          npm install

      - name: Turborepo Build
        run: npm run build

      - name: Run Unit Tests
        run: npm run test

      - name: Lint Check
        run: npm run lint

  validate-dockerfiles:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [auth-service, catalog-service, user-service, loan-service, notification-service, api-gateway, frontend, fine-service, search-service, inventory-service, report-service, reservation-service]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Validate Dockerfile (${{ matrix.app }})
        run: |
          echo "Validating Dockerfile for ${{ matrix.app }}..."
          docker build --file apps/${{ matrix.app }}/Dockerfile apps/${{ matrix.app }} --tag test-${{ matrix.app }}:ci
          echo "✅ Dockerfile for ${{ matrix.app }} builds successfully"
